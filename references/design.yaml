## Brand & Style

This design system powers a **full-fledged SPA dashboard** with theme support (dark, light, system) and integrated TOTP two-factor authentication. The aesthetic is **Clean Functional** — a pragmatic, developer-oriented UI that prioritizes clarity, information density, and operational speed over decorative flair.

The brand personality is **professional and trustworthy**. The teal primary (`#00d4aa` dark / `#0f766e` light) avoids the overused indigo-blue spectrum, opting instead for a muted, calming tone that signals reliability without visual fatigue. The system supports three theme modes — **dark**, **light**, and **system** (auto-detecting OS preference) — with seamless runtime switching and persisted user preference via `localStorage`.

The emotional response should be one of **quiet competence**: everything is where you expect it, nothing draws unnecessary attention, and data surfaces cleanly against the background.

## Colors

The palette uses a **dual-scheme** approach with fully independent token sets for dark and light modes, mapped through a single `data-scheme` attribute on `<html>`.

- **Dark Scheme Canvas:** Global background `#0f0f0f`, primary surface `#171717`, elevated surfaces `#1c1c1c` to `#1e1e1e`.
- **Light Scheme Canvas:** Global background `#f5f5f5`, primary surface `#ffffff`, elevated surfaces `#fafafa`.
- **Border Hierarchy:** Two levels — subtle structural borders (`#272727` dark / `#e2e2e2` light) and strong interactive borders (`#333` dark / `#ccc` light).
- **Accent Strategy:** Teal is the sole primary accent. Status colors (green, amber, red) are used exclusively for badges, indicators, and notifications. All status colors have corresponding muted background variants at 8% opacity for badge fills.
- **Interactive States:** Hover states use `--surface-alt` shifts or muted accent backgrounds. Focus states use a consistent 2px outer ring in the primary color at 35% opacity.

## Typography

**DM Sans** is used as the single typeface across all weights and sizes, unifying the interface with a geometric, humanist sans-serif that performs well at both display and small sizes.

- **Weight Scale:** `400` (body), `500` (labels, nav), `600` (headings, emphasis, buttons), `700` (stat values, display).
- **Section Labels:** 12px / 600 weight / 0.04em letter-spacing / uppercase — used for section dividers and category headers.
- **Data Display:** The `mono-data` variant applies `tabular-nums` to ensure numeric columns in tables align vertically by digit.
- **Tabular Data Cells:** 13px body size for all table content, maintaining tight row density.

## Layout & Spacing

The layout uses a **fixed sidebar + fluid main content** architecture with a single breakpoint at 768px.

- **Grid:** The main content area is unconstrained up to `960px` max-width. No multi-column grid is used within the content; sections stack vertically.
- **Sidebar:** Fixed `248px` width, full viewport height, with internal `8px` padding for nav items.
- **Density:** Internal component padding uses `8px`–`12px` for tight row heights. Cards and panels use `20px` padding. Page content uses `32px` horizontal padding.
- **Rhythm:** All spacing follows a `4px` base grid. Major section separators use `32px`. Component internal gaps use `8px` or `12px`.
- **Stats Row:** Three equal-flex columns with `16px` gap, collapsing to stacked on mobile.

## Elevation & Depth

Hierarchy is established through **subtle surface color shifts** and **1px borders**, not drop shadows.

- **The Layering Rule:** The sidebar uses `--sidebar-bg` (slightly offset from `--bg`). Content surfaces use `--surface`. Hover states use `--surface-alt`. Modals and toasts float above with `--shadow-md`.
- **Dividers:** All internal dividers use `1px solid var(--border)` at the structural level.
- **Elevated Elements:** Modals receive an overlay backdrop (`--overlay` color) and `--shadow-md`. Toast notifications use `--shadow-md` with `--toast-bg`.
- **No Glass Effects:** This system intentionally avoids blur-based glassmorphism in favor of solid, predictable surface colors that work reliably across all three themes.

## Shapes

The shape language is **Soft-Practical** — corners are uniformly gentle but not aggressively rounded.

- **Base Radius:** `6px` (DEFAULT) for buttons, inputs, badges, nav items, and small widgets.
- **Container Radius:** `8px` for cards, panels, table containers, modals, toasts, and the sidebar brand avatar.
- **Pill / Full Radius:** `9999px` used only for the avatar element.
- **Small Radius:** `4px` used for status badges and inline labels.
- **Consistency Rule:** All interactive input types (text inputs, code inputs, buttons, selects) share the same `6px` radius.

## Components

### Buttons
- **Primary:** Background `#00d4aa` (dark) / `#0f766e` (light), text `#0f0f0f` (dark) / `#ffffff` (light), `6px` radius, `600` weight. Hover shifts to `primary-hover`. No gradients.
- **Secondary:** Background `--surface`, `1px` border `--border`, text `--text`. Hover shifts background to `--surface-alt` and border to `--border-strong`.
- **Danger:** Background `--danger-muted` (8% red), text `--danger`. Hover inverts to solid `--danger` background with white text.
- **Ghost:** Transparent background, text `--text-secondary`. Hover shows `--surface-alt` background.
- **Sizes:** Default (`7px 14px` padding, `13px` font) and Small (`4px 10px` padding, `12px` font).

### Inputs & Fields
- **Styling:** Background `--input-bg` (`#1a1a1a` dark / `#ffffff` light), `1px` border `--border`, `6px` radius.
- **Hover State:** Border shifts to `--border-strong`.
- **Focus State:** Border shifts to `--primary` with `--focus-ring` (2px outer glow, 35% primary opacity).
- **TOTP Code Inputs:** `40px` wide, `48px` tall, `20px` font, centered numeric entry with auto-advance behavior.

### Data Panels (Cards)
- Background `--surface` with `1px` border `--border`, `8px` radius.
- **Internal Layout:** `panel-row` items use top border `--border` for separation, `16px` vertical padding, and `24px` gap between label and value areas.
- **Title + Description Pattern:** `panel-title` at `15px/600` followed by `panel-desc` at `13px` in `--text-secondary`.

### Tables
- **Container:** Background `--surface`, `1px` border, `8px` radius, overflow hidden.
- **Header Bar:** `--surface-alt` background for `<thead>`, `12px/600/uppercase` labels in `--text-tertiary`.
- **Row Height:** `36px` effective height (`10px` vertical padding on `13px` text).
- **Hover State:** Background shifts to `--table-hover`.
- **Last Row:** No bottom border on final `<tbody>` row.

### Status Badges
- `12px` font, `500` weight, `2px 8px` padding, `4px` radius.
- **Variants:** `badge-success` (green muted bg), `badge-warning` (amber muted bg), `badge-danger` (red muted bg), `badge-neutral` (surface-alt bg with border).
- Status indicators are the only high-saturation elements on screen.

### Sidebar Navigation
- Fixed left panel, `248px` wide.
- Nav items: `8px 12px` padding, `6px` radius, `14px/500` text.
- Active state: `--primary-muted` background with `--primary` text.
- Hover state: `--primary-muted` background with `--text` text.
- Separator: `1px` divider between primary nav and utility links.

### Modals
- Overlay: `--overlay` background covering viewport.
- Dialog: `--surface` background, `8px` radius, `--shadow-md`, `1px` border `--border`.
- **Focus Trap:** All keyboard focus is confined within the modal. `Escape` key closes. `Tab`/`Shift+Tab` cycles through focusable elements.
- **Animation:** `fadeIn` on overlay (150ms), `scale(0.97)` to `scale(1)` on dialog (150ms).

### Toast Notifications
- Fixed bottom-right, `--toast-bg` background, `8px` radius, `--shadow-md`, `1px` border `--border`.
- **Types:** Success (green icon), Error (red icon), Info (teal icon).
- **Animation:** Slide up + fade in (200ms). Auto-dismiss at 4s. Manual dismiss with slide down + fade out (150ms).
- **ARIA:** Container uses `role="status"` and `aria-live="polite"` for screen reader announcements.

### TOTP Two-Factor Authentication
- **Status Indicator:** Circular `8px` dot + text. Green dot for enabled, gray for disabled.
- **Setup Flow:** Step 1 (QR code display + manual key) → Step 2 (6-digit code entry with auto-advance) → Enabled state (recovery codes grid).
- **Recovery Codes:** 2-column grid layout, monospace font, `--surface-alt` background panel.
- **Actions:** Enable, Continue, Verify, Back, Cancel, Copy codes, Regenerate, Disable — all wired with modal confirmation for destructive actions.

### Theme Toggle
- `36px` square button, `1px` border `--border`, `6px` radius, transparent background.
- Cycles through: Light → Dark → System.
- Icon changes to reflect current mode (sun / moon / monitor).
- Theme preference is persisted in `localStorage` under key `acme-theme`.
- System mode listens to `prefers-color-scheme` media query changes in real time.

### Skip Link
- Hidden by default (`top: -100%`), appears on focus at `top: 12px`.
- Styled with primary background and `600` weight text.
- Target is `#main-content` on the `<main>` element.

### Responsive Behavior
- **Breakpoint:** `768px`.
- **Below breakpoint:** Sidebar is hidden. Main content fills full width. Page padding reduces to `16px`. Stats row stacks vertically. Two-column inputs collapse to single column. Code input size reduces. Recovery codes grid collapses to single column.
